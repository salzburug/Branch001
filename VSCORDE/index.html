<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>じゃんけんゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>じゃんけんゲーム</h1>

    <div class="scoreboard">
      <div>あなた: <span id="player-score">0</span></div>
      <div>コンピュータ: <span id="cpu-score">0</span></div>
    </div>

    <div class="choices">
      <button class="hand" data-hand="0">グー</button>
      <button class="hand" data-hand="1">チョキ</button>
      <button class="hand" data-hand="2">パー</button>
    </div>

    <div class="result">
      <div id="player-choice">あなた: -</div>
      <div id="cpu-choice">コンピュータ: -</div>
      <div id="outcome">選んでください</div>
    </div>

    <button id="reset">リセット</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
